- arxiv_id: 2604.14072v1
  title: Persistent Iterators with Value Semantics
  authors:
  - Yihe Li
  - Gregory J. Duck
  summary: "Iterators are a fundamental programming abstraction for traversing and\
    \ modifying elements in containers in mainstream imperative languages such as\
    \ C++. Iterators provide a uniform access mechanism that hides low-level implementation\
    \ details of the underlying data structure. However, iterators over mutable containers\
    \ suffer from well-known hazards including invalidation, aliasing, data races,\
    \ and subtle side effects. Immutable data structures, as used in functional programming\
    \ languages, avoid the pitfalls of mutation but rely on a very different programming\
    \ model based on recursion and higher-order combinators rather than iteration.\
    \ However, these combinators are not always well-suited to expressing certain\
    \ algorithms, and recursion can expose implementation details of the underlying\
    \ data structure.\n  In this paper, we propose persistent iterators -- a new abstraction\
    \ that reconciles the familiar iterator-based programming style of imperative\
    \ languages with the semantics of persistent data structures. A persistent iterator\
    \ snapshots the version of its underlying container at creation, ensuring safety\
    \ against invalidation and aliasing. Iterator operations operate on the iterator-local\
    \ copy of the container, giving true value semantics: variables can be rebound\
    \ to new persistent values while previous versions remain accessible. We implement\
    \ our approach in the form of LibFPP -- a C++ container library providing persistent\
    \ vectors, maps, sets, strings, and other abstractions as persistent counterparts\
    \ to the Standard Template Library (STL). Our evaluation shows that LibFPP retains\
    \ the expressiveness of iterator-based programming, eliminates iterator-invalidation,\
    \ and achieves asymptotic complexities comparable to STL implementations. Our\
    \ design targets use cases where persistence and safety are desired, while allowing\
    \ developers to retain familiar iterator-based programming patterns."
  tldr: '- Addresses the risk of iterator invalidation, aliasing, and side effects
    in mutable containers (like C++ STL), which can lead to memory corruption, undefined
    behavior, and security vulnerabilities in low-level systems.

    - Introduces persistent iterators that capture a snapshot of the container at
    creation, enabling all operations to work on a local, immutable copy with true
    value semantics, implemented in a C++ library (LibFPP) as persistent versions
    of STL containers.

    - Enhances memory safety by eliminating iterator invalidation bugs and aliasing
    issues, making code more predictable and secure without requiring a shift to functional
    programming models, thus preserving familiar imperative patterns for systems programming.'
  ai_score: 8
  ai_reason: The paper directly addresses memory safety (by preventing invalidation
    and aliasing), spatial/temporal safety (through persistent snapshots and value
    semantics), and applies program analysis concepts in a C++ context, closely aligning
    with the researcher's focus on safety, type systems, and formal semantics for
    imperative languages.
