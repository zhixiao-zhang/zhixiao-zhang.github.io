- arxiv_id: 2505.17676v3
  title: 'Asynchronous Global Protocols, Precisely: Full Proofs'
  authors:
  - Kai Pischke
  - Jake Masters
  - Nobuko Yoshida
  summary: 'Asynchronous multiparty session types are a type-based framework which
    ensure the compatibility of components in a distributed system by checking compliance
    against a specified global protocol. We propose a top-down approach, starting
    with the global protocol which is then projected into a set of local specifications.
    Next, we use an asynchronous refinement relation, precise asynchronous multiparty
    subtyping, to enable local specifications to be optimised by permuting actions
    within individual asynchronous components. This supports local reasoning, as each
    component can be independently developed and refined in isolation, before being
    integrated into a larger system. We show that this methodology guarantees both
    type soundness and liveness of the collection of optimised components. In this
    article, we first propose new operational semantics of global protocols which
    capture sound optimisations in the context of asynchronous message-passing. Next
    we define an asynchronous association between global protocols and a set of optimised
    local types. Thirdly, we prove, for the first time, the correctness of the most
    expressive endpoint projection in the literature, coinductive full merging projection.
    We then show the main theorems of this article: soundness and completeness of
    the operational correspondence of the asynchronous association. As a consequence,
    the association acts as an invariant that can be used to transfer key theorems
    from the bottom-up system to the top-down system. In particular, we used this
    to prove type soundness, session-fidelity, deadlock-freedom and liveness of the
    collection of optimised endpoints.'
  tldr: '- The paper addresses the risk of deadlocks or communication errors in distributed
    systems when independently optimized components are composed, by ensuring local
    refinements (like reordering sends and receives) remain globally safe.


    - It introduces an asynchronous refinement relation (precise asynchronous multiparty
    subtyping) that allows local components to permute message actions without breaking
    the overall protocol, verified via coinductive full merging projection.


    - This matters for system security and low-level safety because it guarantees
    liveness and deadlock-freedom in message-passing systems, preventing subtle concurrency
    bugs that could lead to crashes or vulnerabilities in asynchronous distributed
    software.'
  ai_score: 8
  ai_reason: The paper's focus on formal semantics, type systems, and ensuring safety
    properties like deadlock-freedom and liveness in asynchronous message-passing
    systems aligns closely with the researcher's interests in type theory, program
    analysis, and formal verification, though it does not directly address memory,
    temporary, or spatial safety.
