- arxiv_id: 2603.29088v2
  title: 'WybeCoder: Verified Imperative Code Generation'
  authors:
  - Fabian Gloeckle
  - Mantas Baksys
  - Darius Feher
  - Kunhao Zheng
  - Amaury Hayat
  - Sean B. Holden
  - Gabriel Synnaeve
  - Peter O'Hearn
  summary: Recent progress in large language models (LLMs) has substantially advanced
    automatic code generation and formal theorem proving, yet software verification
    has not seen comparable gains. To address this gap, we propose WybeCoder, an agentic
    code verification framework that enables prove-as-you-generate development, in
    which code, invariants, and proofs co-evolve. WybeCoder builds on a recent framework
    that combines automatic verification condition generation and SMT solving with
    interactive proofs in Lean. To enable systematic evaluation, we translate two
    benchmarks for functional verification in Lean, Verina and Clever, into equivalent
    imperative code specifications. On complex algorithms such as Heapsort, we observe
    consistent performance improvements as we scale our approach, synthesizing dozens
    of valid invariants and dispatching dozens of subgoals, ultimately producing hundreds
    of lines of verified code and overcoming plateaus reported in previous work. Our
    best system solves 74% of Verina tasks and 62% of Clever tasks at moderate compute
    budgets, substantially surpassing previous evaluations and paving the way for
    the automated construction of large-scale datasets of verified imperative code.
  tldr: '- Addresses the gap in automated verification for imperative code generation,
    where current LLMs excel at writing code but struggle to produce provably correct,
    memory-safe implementations.

    - Uses an agentic framework that interleaves code generation with invariant synthesis
    and proof construction in Lean, leveraging SMT solvers and interactive proving
    to co-evolve code, invariants, and correctness proofs.

    - Enables scalable production of verified low-level algorithms (like Heapsort),
    directly reducing risks of memory corruption, undefined behavior, and security
    vulnerabilities by ensuring generated code meets formal specifications.'
