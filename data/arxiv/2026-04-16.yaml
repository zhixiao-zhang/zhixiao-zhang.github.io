- arxiv_id: 2507.15671v2
  title: 'BugScope: Learn to Find Bugs Like Human'
  authors:
  - Jinyao Guo
  - Chengpeng Wang
  - Dominic Deluca
  - Jinjie Liu
  - Zhuo Zhang
  - Xiangyu Zhang
  summary: 'Software auditing is an increasingly critical task in the era of rapid
    code generation. While LLM-based auditors have demonstrated strong potential,
    their effectiveness remains limited by misalignment with the highly complex, domain-specific
    nature of bug detection. In this work, we introduce BugScope, a framework that
    mirrors how human auditors learn specific bug patterns from representative examples
    and apply this knowledge during code auditing. BugScope structures auditing into
    three steps: seed identification, context retrieval, and bug detection, and aligns
    LLMs to each step by analyzing real bug reports and mutated examples, and distilling
    concise, reusable guidelines. On a curated dataset of 33 real-world bugs from
    21 widely used open-source projects, BugScope achieves 86.05\% precision and 87.88\%
    recall, corresponding to an F1 score of 0.87. By comparison, leading industrial
    tools such as Claude Code (with Claude Opus 4.6) and Cursor BugBot achieve F1
    scores of only 0.51 and 0.43, respectively. Beyond benchmarks, large-scale evaluation
    on real-world projects such as the Linux kernel uncovered 184 previously unknown
    bugs, of which 78 have already been fixed and 7 explicitly confirmed by developers.
    Our code is available at https://github.com/jinyaoguo/BugScope'
  tldr: '- Addresses the gap where current LLM-based code auditors underperform because
    they lack alignment with the specialized, pattern-based reasoning human experts
    use to find security bugs in complex software.

    - Uses a framework that mimics human auditing: it first identifies seed bug patterns,
    retrieves relevant contextual code, and then applies distilled, concrete detection
    guidelines—trained on real bug reports and mutated examples—to scan code.

    - Matters for system security because it significantly improves automated bug
    detection precision and recall over existing tools, enabling the discovery of
    numerous previously unknown vulnerabilities in critical software like the Linux
    kernel.'
