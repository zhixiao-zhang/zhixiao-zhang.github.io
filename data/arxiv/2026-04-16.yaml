- arxiv_id: 2604.13638v1
  title: 'Cerisier: A Program Logic for Attestation in a Capability Machine'
  authors:
  - June Rousseau
  - Denis Carnier
  - Thomas Van Strydonck
  - Steven Keuchel
  - Dominique Devriese
  - Lars Birkedal
  summary: "A key feature in trusted computing is attestation, which allows encapsulated\
    \ components (enclaves) to prove their identity to (local or remote) distrusting\
    \ components.Reasoning about software that uses the technique requires tracking\
    \ how trust evolves after successful attestation.This process is security-critical\
    \ and non-trivial, but no existing formal verification technique supports modular\
    \ reasoning about attestation of enclaves and their clients, or proving end-to-end\
    \ properties for systems combining trusted, untrusted and attested code.\n  We\
    \ contribute Cerisier, the first program logic for modular reasoning about trusted,\
    \ untrusted and attested code, fully mechanized in the Iris separation logic and\
    \ the Rocq Prover.We formalize a recent proposal, CHERI-TrEE, to extend capability\
    \ machines with enclave primitives, as an extension to the Cerise capability machine\
    \ and program logic.Our program logic comes with a universal contract for untrusted\
    \ code, which captures both capability safety and local enclave attestation.Like\
    \ Cerise, this universal contract is phrased in terms of a logical relation defining\
    \ capabilities' authority.We demonstrate Cerisier by proving end-to-end properties\
    \ for three representative applications of trusted computing: secure outsourced\
    \ computation, mutual attestation and a modeled trusted sensor component."
  tldr: '- Addresses the inability to formally verify and reason about trust evolution
    in systems using hardware enclave attestation, a critical security gap for trusted
    computing applications.

    - Introduces Cerisier, a program logic built on Iris separation logic, which extends
    the Cerise capability machine model to support modular reasoning about trusted,
    untrusted, and attested code via a universal contract.

    - Provides a foundation for proving end-to-end security properties (like integrity
    and secrecy) in mixed-trust systems, directly linking low-level capability safety
    to high-level attestation guarantees.'
  ai_score: 8
  ai_reason: The paper presents a program logic for a capability machine with enclave
    primitives, directly engaging with formal semantics, program analysis, memory
    safety via capabilities, and type-like reasoning about authority, aligning with
    the researcher's focus on memory safety, type systems, formal semantics, and program
    analysis.
