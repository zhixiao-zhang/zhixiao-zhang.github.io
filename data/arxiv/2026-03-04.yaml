- arxiv_id: 2510.25015v4
  title: 'VeriStruct: AI-assisted Automated Verification of Data-Structure Modules
    in Verus'
  authors:
  - Chuyue Sun
  - Yican Sun
  - Daneshvar Amrollahi
  - Ethan Zhang
  - Shuvendu Lahiri
  - Shan Lu
  - David Dill
  - Clark Barrett
  summary: We introduce VeriStruct, a novel framework that extends AI-assisted automated
    verification from single functions to more complex data structure modules in Verus.
    VeriStruct employs a planner module to orchestrate the systematic generation of
    abstractions, type invariants, specifications, and proof code. To address the
    challenge that LLMs often misunderstand Verus' annotation syntax and verification-specific
    semantics, VeriStruct embeds syntax guidance within prompts and includes a repair
    stage to automatically correct annotation errors. In an evaluation on eleven Rust
    data structure modules, VeriStruct succeeds on ten of the eleven, successfully
    verifying 128 out of 129 functions (99.2%) in total. These results represent an
    important step toward the goal of automatic AI-assisted formal verification.
  tldr: '- Addresses the difficulty of using large language models to automatically
    verify complex data structure modules in Verus, as LLMs often misinterpret the
    tool''s specialized annotation syntax and verification semantics.

    - Embeds syntax guidance into prompts and adds an automated repair stage to correct
    annotation errors, orchestrating the generation of abstractions, type invariants,
    and proof code.

    - Matters because it automates formal verification for entire data-structure modules
    (not just single functions), directly improving the assurance of memory safety
    and correctness in low-level systems code written in Rust.'
