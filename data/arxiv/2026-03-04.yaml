- arxiv_id: 2603.03141v1
  title: Efficient Dynamic Algorithms to Predict Short Races
  authors:
  - Minjian Zhang
  - Mahesh Viswanathan
  summary: 'We introduce and study the problem of detecting short races in an observed
    trace. Specifically, for a race type $R$, given a trace $σ$ and window size $w$,
    the task is to determine whether there exists an $R$-race $(e_1, e_2)$ in $σ$
    such that the subtrace starting with $e_1$ and ending with $e_2$ contains at most
    $w$ events. We present a monitoring framework for short-race prediction and instantiate
    the framework for happens-before and sync-preserving races, yielding efficient
    detection algorithms. Our happens-before algorithm runs in the same time as FastTrack
    but uses space that scales with $\log w$ as opposed to $\log |σ|$. For sync-preserving
    races, our algorithm runs faster and consumes significantly less space than SyncP.
    Our experiments validate the effectiveness of these short-race detection algorithms:
    they run more efficiently, use less memory, and detect significantly more races
    under the same budget, offering a reasonable balance between resource usage and
    predictive power.'
  tldr: '- Addresses the problem of detecting short data races in concurrent program
    traces, where existing dynamic race detectors can be inefficient or miss races
    that occur within small windows of events, limiting their practical use in continuous
    monitoring or resource-constrained environments.

    - Proposes a monitoring framework that focuses on races where the two conflicting
    events are within a bounded window size \( w \), and provides efficient algorithms
    for happens-before and sync-preserving race detection that optimize space usage
    to scale with \( \log w \) rather than the full trace length.

    - Improves memory safety and system security by enabling more scalable and effective
    dynamic race detection, allowing for real-time or long-term monitoring with lower
    overhead, which helps identify concurrency bugs that could lead to crashes, data
    corruption, or security vulnerabilities in low-level systems.'
  ai_score: 8
  ai_reason: The paper presents dynamic algorithms for predicting data races, which
    directly addresses memory safety, program analysis, and sanitizer techniques,
    aligning with the researcher's focus on detecting concurrency-related safety violations.
