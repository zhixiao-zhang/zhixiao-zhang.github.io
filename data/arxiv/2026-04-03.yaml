- arxiv_id: 2604.01442v1
  title: Fuzzing with Agents? Generators Are All You Need
  authors:
  - Vasudev Vikram
  - Rohan Padhye
  summary: "Modern generator-based fuzzing techniques combine lightweight input generators\
    \ with coverage-guided mutation as a method of exploring deep execution paths\
    \ in a target program. A complimentary approach in prior research focuses on creating\
    \ highly customized, domain-specific generators that encode structural and semantic\
    \ logic sufficient enough to reach deep program states; the challenge comes from\
    \ the overhead of writing and testing these complex generators. We investigate\
    \ whether AI coding agents can automatically synthesize such target-specific generators,\
    \ and whether the resulting generators are strong enough to obviate the need for\
    \ coverage guidance and mutation entirely.\n  Our approach, Gentoo, is comprised\
    \ of an LLM coding agent (provided terminal access and source code of the fuzz\
    \ target and its library) instructed to iteratively synthesize and refine an input\
    \ generator, and optionally provided fine-grained predicate-level coverage feedback.\
    \ We evaluate three configurations of Gentoo against human-written generators\
    \ on fuzz targets for 7 real-world Java libraries. Our findings show that agent-synthesized\
    \ generators achieve statistically significantly higher branch coverage than human-written\
    \ baseline generators on 4 of 7 benchmarks. Critically, the use of coverage guidance\
    \ and mutation strategies is not statistically significantly beneficial for agent-synthesized\
    \ generators, but is significant for all human-written generators, suggesting\
    \ that structural and semantic logic encoded in the agent generators makes coverage\
    \ guidance largely unnecessary."
  tldr: '- The paper addresses the high effort and expertise required to manually
    write effective, domain-specific input generators for fuzzing, which are needed
    to reach deep, bug-revealing states in software.

    - The core method, Gentoo, uses an LLM coding agent with access to the target''s
    source code to automatically synthesize and iteratively refine a dedicated input
    generator, optionally guided by fine-grained coverage feedback.

    - This matters because it shows AI-generated generators can structurally and semantically
    encode enough logic to achieve high coverage without relying on traditional coverage-guided
    mutation, potentially automating a key bottleneck in memory and system security
    testing.'
  ai_score: 7
  ai_reason: The paper's focus on automated generation of structurally and semantically
    correct program inputs via AI agents directly relates to program analysis and
    sanitizer techniques for uncovering memory, spatial, and temporal safety violations
    through fuzzing.
