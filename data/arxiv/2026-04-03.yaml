- arxiv_id: 2603.27224v2
  title: Finding Memory Leaks in C/C++ Programs via Neuro-Symbolic Augmented Static
    Analysis
  authors:
  - Huihui Huang
  - Jieke Shi
  - Bo Wang
  - Zhou Yang
  - David Lo
  summary: Memory leaks remain prevalent in real-world C/C++ software. Static analyzers
    such as CodeQL provide scalable program analysis but frequently miss such bugs
    because they cannot recognize project-specific custom memory-management functions
    and lack path-sensitive control-flow modeling. We present MemHint, a neuro-symbolic
    pipeline that addresses both limitations by combining LLMs' semantic understanding
    of code with Z3-based symbolic reasoning. MemHint parses the target codebase and
    applies an LLM to classify each function as a memory allocator, deallocator, or
    neither, producing function summaries that record which argument or return value
    carries memory ownership, extending the analyzer's built-in knowledge beyond standard
    primitives such as malloc and free. A Z3-based validation step checks each summary
    against the function's control-flow graph, discarding those whose claimed memory
    operation is unreachable on any feasible path. The validated summaries are injected
    into CodeQL and Infer via their respective extension mechanisms. Z3 path feasibility
    filtering then eliminates warnings on infeasible paths, and a final LLM-based
    validation step confirms whether each remaining warning is a genuine bug. On seven
    real-world C/C++ projects totaling over 3.4M lines of code, MemHint detects 52
    unique memory leaks (49 confirmed/fixed, 4 CVEs submitted) at approximately $1.7
    per detected bug, compared to 19 by vanilla CodeQL and 3 by vanilla Infer.
  tldr: '- Addresses static analyzers'' inability to detect memory leaks involving
    custom memory-management functions and infeasible control-flow paths in C/C++
    code.

    - Uses an LLM to classify project-specific functions as allocators or deallocators,
    validates summaries with Z3 symbolic reasoning, and integrates them into CodeQL/Infer
    to improve path-sensitive analysis.

    - Enables detection of real-world memory leaks that standard tools miss, reducing
    manual effort and identifying security-critical bugs, as shown by finding 52 leaks
    (including CVEs) in large codebases.'
