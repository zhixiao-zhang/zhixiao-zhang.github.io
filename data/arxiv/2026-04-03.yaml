- arxiv_id: 2601.22978v2
  title: 'Triosecuris: Formally Verified Protection Against Speculative Control-Flow
    Hijacking'
  authors:
  - Jonathan Baumann
  - Yonghyun Kim
  - Yan Farba
  - Catalin Hritcu
  - Julay Leatherman-Brooks
  summary: 'This paper introduces Triosecuris, a formally verified defense against
    Spectre BTB, RSB, and PHT that combines CET-style hardware-assisted control-flow
    integrity with compiler-inserted speculative load hardening (SLH). Triosecuris
    is based on the novel observation that in the presence of CET-style protection,
    we can precisely detect BTB misspeculation for indirect calls and RSB misspeculation
    for returns and set the SLH misspeculation flag. We formalize Triosecuris as a
    transformation in Rocq and provide a machine-checked proof that it achieves relative
    security: any transformed program running with speculation leaks no more than
    what the source program leaks without speculation. This strong security guarantee
    applies to arbitrary programs, even those not following the cryptographic constant-time
    programming discipline.'
  tldr: '- Addresses the risk of speculative control-flow hijacking attacks (Spectre-v2
    variants like BTB, RSB, and PHT) that bypass traditional control-flow integrity
    by exploiting CPU speculation.

    - Combines CET-style hardware control-flow integrity with compiler-inserted speculative
    load hardening (SLH), using hardware assistance to precisely detect misspeculation
    on indirect calls and returns to trigger SLH''s defense mechanisms.

    - Provides a formally verified guarantee that transformed programs leak no more
    information under speculation than the original program does without speculation,
    strengthening memory safety for arbitrary code without requiring constant-time
    programming.'
  ai_score: 8
  ai_reason: The paper addresses memory safety and security against speculative execution
    attacks via formal verification and program transformation, aligning with the
    researcher's focus on memory safety, program analysis, formal semantics, and sanitizers.
