- arxiv_id: 2509.21629v3
  title: 'Quokka: Accelerating Program Verification with LLMs via Invariant Synthesis'
  authors:
  - Anjiang Wei
  - Tianran Sun
  - Tarun Suresh
  - Haoze Wu
  - Ke Wang
  - Alex Aiken
  summary: Program verification relies on loop invariants, yet automatically discovering
    strong invariants remains a long-standing challenge. We investigate whether large
    language models (LLMs) can accelerate program verification by generating useful
    loop invariants. We introduce Quokka, an evaluation-oriented framework for LLM-based
    invariant synthesis that provides sound evaluation and achieves state-of-the-art
    performance. Unlike prior work that treats LLM outputs as noisy symbolic material
    requiring substantial post-processing, Quokka adopts a simpler and evaluation-centric
    design that directly validates whether each LLM-generated invariant helps prove
    the target assertion. We construct a benchmark of 866 instances derived from SV-COMP
    and evaluate 9 state-of-the-art LLMs across multiple model families. We demonstrate
    that supervised fine-tuning and Best-of-N sampling yield measurable improvements,
    and we show that Quokka consistently outperforms prior LLM-based verifiers. Our
    code and data are publicly available at https://github.com/Anjiang-Wei/Quokka
  tldr: '- The problem is that automated program verification often fails at generating
    strong loop invariants, which are essential for proving program correctness, especially
    for complex loops.

    - The core method is Quokka, a framework that uses large language models (LLMs)
    to directly propose loop invariants and then rigorously checks each proposal with
    a verifier to see if it suffices to prove the target program assertion.

    - This matters for system security because reliable automated verification of
    low-level code (e.g., in operating systems or cryptography) can catch memory safety
    bugs and logic flaws before deployment, and LLMs can potentially make this verification
    more practical and scalable.'
  ai_score: 8
  ai_reason: The paper directly addresses program verification, a core aspect of program
    analysis, and its method of invariant synthesis relates to formal semantics and
    type systems, aligning with the researcher's focus on automated reasoning for
    safety and correctness.
