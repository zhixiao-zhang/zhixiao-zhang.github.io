- arxiv_id: 2604.15136v1
  title: Feedback-Driven Execution for LLM-Based Binary Analysis
  authors:
  - XiangRui Zhang
  - Qiang Li
  - Haining Wang
  summary: Binary analysis increasingly relies on large language models (LLMs) to
    perform semantic reasoning over complex program behaviors. However, existing approaches
    largely adopt a one-pass execution paradigm, where reasoning operates over a fixed
    program representation constructed by static analysis tools. This formulation
    limits the ability to adapt exploration based on intermediate results and makes
    it difficult to sustain long-horizon, multi-path analysis under constrained context.
    We present FORGE, a system that rethinks LLM-based analysis as a feedback-driven
    execution process. FORGE interleaves reasoning and tool interaction through a
    reasoning-action-observation loop, enabling incremental exploration and evidence
    construction. To address the instability of long-horizon reasoning, we introduce
    a Dynamic Forest of Agents (FoA), a decomposed execution model that dynamically
    coordinates parallel exploration while bounding per-agent context. We evaluate
    FORGE on 3,457 real-world firmware binaries. FORGE identifies 1,274 vulnerabilities
    across 591 unique binaries, achieving 72.3% precision while covering a broader
    range of vulnerability types than prior approaches. These results demonstrate
    that structuring LLM-based analysis as a decomposed, feedback-driven execution
    system enables both scalable reasoning and high-quality outcomes in long-horizon
    tasks.
  tldr: '- Addresses the limitation of one-pass LLM-based binary analysis, which cannot
    adapt exploration based on intermediate results and struggles with long, multi-path
    analysis under context constraints.

    - Introduces FORGE, which uses a feedback-driven loop (reasoning-action-observation)
    and a Dynamic Forest of Agents to coordinate parallel exploration while managing
    per-agent context.

    - Enables scalable, precise vulnerability discovery in firmware (e.g., 1,274 vulnerabilities
    found with 72.3% precision), improving memory and system security by effectively
    analyzing complex, real-world binaries.'
