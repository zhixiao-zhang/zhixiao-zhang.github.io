- arxiv_id: 2604.15266v1
  title: Simplifying Safety Proofs with Forward-Backward Reasoning and Prophecy
  authors:
  - Eden Frenkel
  - Kenneth L. McMillan
  - Oded Padon
  - Sharon Shoham
  summary: We propose an incremental approach for safety proofs that decomposes a
    proof with a complex inductive invariant into a sequence of simpler proof steps.
    Our proof system combines rules for (i) forward reasoning using inductive invariants,
    (ii) backward reasoning using inductive invariants of a time-reversed system,
    and (iii) prophecy steps that add witnesses for existentially quantified properties.
    We prove each rule sound and give a construction that recovers a single safe inductive
    invariant from an incremental proof. The construction of the invariant demonstrates
    the increased complexity of a single inductive invariant compared to the invariant
    formulas used in an incremental proof, which may have simpler Boolean structures
    and fewer quantifiers and quantifier alternations. Under natural restrictions
    on the available invariant formulas, each proof rule strictly increases proof
    power. That is, each rule allows to prove more safety problems with the same set
    of formulas. Thus, the incremental approach is able to reduce the search space
    of invariant formulas needed to prove safety of a given system. A case study on
    Paxos, several of its variants, and Raft demonstrates that forward-backward steps
    can remove complex Boolean structure while prophecy eliminates quantifiers and
    quantifier alternations.
  tldr: '- Addresses the difficulty of constructing complex inductive invariants for
    verifying safety of concurrent/distributed protocols, where manual proofs are
    error-prone and automated search struggles with Boolean complexity and quantifiers.

    - Introduces an incremental proof system combining forward reasoning (standard
    invariants), backward reasoning (invariants of time-reversed system), and prophecy
    steps (adding witnesses for existential properties) to decompose a single invariant
    into simpler steps.

    - Reduces the search space for invariants by allowing simpler formulas with fewer
    quantifiers, making automated verification more tractable for systems like Paxos
    and Raft, thus improving reliability of memory-safe and secure low-level implementations.'
  ai_score: 8
  ai_reason: The paper presents a formal method for constructing safety proofs using
    inductive invariants, directly addressing core topics like program analysis, formal
    semantics, and abstract interpretation, though it is not specific to Rust or low-level
    safety properties like memory or spatial safety.
