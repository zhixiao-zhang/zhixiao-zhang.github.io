- arxiv_id: 2604.07349v5
  title: Exact Structural Abstraction and Tractability Limits
  authors:
  - Tristan Simas
  summary: "Any rigorously specified problem determines an admissible-output relation\
    \ $R$, and exact correctness depends only on the induced classes $s \\sim_R s'\
    \ \\iff \\mathrm{Adm}_R(s)=\\mathrm{Adm}_R(s')$. Exact relevance certification\
    \ asks which coordinates recover those classes. Decision, search, approximation,\
    \ statistical, randomized, horizon, and distributional guarantees all reduce to\
    \ this same quotient-recovery problem. Tractable cases still admit a finite primitive\
    \ basis, but optimizer-quotient realizability is maximal, so quotient shape alone\
    \ cannot mark the frontier.\n  For frontier theorems, orbit gaps are the exact\
    \ obstruction. Exact classification by closure-law-invariant predicates succeeds\
    \ exactly when the target is constant on closure orbits; on a closure-closed domain,\
    \ this is equivalent to disjointness of the positive and negative orbit hulls,\
    \ and when it holds there is a least exact closure-invariant classifier. Across\
    \ four natural candidate tractability predicates, a uniform pair-targeted affine\
    \ witness produces same-orbit disagreements and rules out exact structural classification\
    \ on the full binary pairwise domain. Because the canonical optimizer-set exact\
    \ specifications of that witness class are already rigorously specified problems,\
    \ no universal exact-certification characterization over formal problems escapes\
    \ the same obstruction; this is by internal witness class, not by asserting that\
    \ every problem is binary pairwise. Restricting the domain helps only by removing\
    \ orbit gaps. Approximation also has a strict limit: without explicit gap control,\
    \ arbitrarily small perturbations can flip relevance and sufficiency."
  tldr: '- The paper addresses the fundamental impossibility of creating a universal,
    exact "relevance certification" system for formally specified problems. The core
    risk is that even with a rigorous problem specification, determining which parts
    of an input are truly relevant for correctness cannot be done exactly for all
    problems without encountering intractable cases.


    - The core technical method is analyzing problems via their *admissible-output
    relation* and the induced equivalence classes of inputs. It proves that the barrier
    to exact classification is the presence of "orbit gaps"—differences between inputs
    that are not distinguished by any closure-invariant predicate, which are the only
    predicates a structural classifier can use.


    - This matters for system security because it sets a mathematical limit on automated
    reasoning about program correctness and memory safety. It shows that no single
    automated tool can exactly and universally certify which program components (e.g.,
    memory addresses, data fields) are relevant for safety, forcing a reliance on
    approximations or domain restrictions.


    - The paper demonstrates this limit concretely by constructing a "uniform pair-targeted
    affine witness" problem on binary pairwise domains. For this problem, any two
    inputs in the same "closure orbit" can disagree on the target output, making exact
    structural classification impossible. This witness problem is itself a legitimate,
    rigorously specified problem, proving the obstruction is inherent.'
