- arxiv_id: 2604.15290v1
  title: 'Pure Borrow: Linear Haskell Meets Rust-Style Borrowing'
  authors:
  - Yusuke Matsushita
  - Hiromi Ishii
  summary: "A promising approach to unifying functional and imperative programming\
    \ paradigms is to localize mutation using linear or affine types. Haskell, a purely\
    \ functional language, was recently extended with linear types by Bernardy et\
    \ al., named Linear Haskell. However, it remained unknown whether such a pure\
    \ language could safely support non-local \\emph{borrowing} in the style of Rust,\
    \ where each borrower can be freely split and dropped without direct communication\
    \ of ownership back to the lender.\n  We answer this question affirmatively by\
    \ \\emph{Pure Borrow}, a novel framework that realizes Rust-style borrowing in\
    \ Linear Haskell with purity. Notably, it features parallel state mutation with\
    \ affine mutable references inside pure computation, unlike the IO and ST monads\
    \ and existing Linear Haskell APIs. It also enjoys purity, lazy evaluation, first-class\
    \ polymorphism and leak freedom, unlike Rust. We implement Pure Borrow simply\
    \ as a library in Linear Haskell and demonstrate its power with a case study in\
    \ parallel computing. We formalize the core of Pure Borrow and build a metatheory\
    \ that works toward establishing safety, leak freedom and confluence, with a new,\
    \ history-based model of borrowing."
  tldr: '- **Problem addressed:** Linear Haskell''s linear types could not support
    non-local, Rust-style borrowing—where a borrowed reference can be split, dropped,
    or passed around without explicit ownership return—while preserving language purity.


    - **Core technical method:** The Pure Borrow library introduces affine mutable
    references that allow parallel state mutation within pure computations, using
    a history-based model to track borrowing relationships without requiring IO or
    ST monads.


    - **Why it matters:** This enables safe, leak-free mutation and parallelism in
    a purely functional setting, combining Haskell''s purity, lazy evaluation, and
    first-class polymorphism with Rust-like borrowing, advancing memory safety without
    runtime overhead or side effects.'
  ai_score: 10
  ai_reason: The paper directly integrates Rust-style borrowing, linear types, memory
    safety, and formal semantics into a functional language, addressing all core research
    focuses including type systems, program analysis, and abstract interpretation.
