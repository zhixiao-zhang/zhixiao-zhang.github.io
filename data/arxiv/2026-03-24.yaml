- arxiv_id: 2603.22048v1
  title: Dynamic analysis enhances issue resolution
  authors:
  - Mingwei Liu
  - Zihao Wang
  - Zhenxi Chen
  - Zheng Pei
  - Yanlin Wang
  - Zibin Zheng
  summary: "Translating natural language descriptions into viable code fixes remains\
    \ a fundamental challenge in software engineering. While the proliferation of\
    \ agentic large language models (LLMs) has vastly improved automated repository-level\
    \ debugging, current frameworks hit a ceiling when dealing with sophisticated\
    \ bugs like implicit type degradations and complex polymorphic control flows.\
    \ Because these methods rely heavily on static analysis and superficial execution\
    \ feedback, they lack visibility into intermediate runtime states. Consequently,\
    \ agents are forced into costly, speculative trial-and-error loops, wasting computational\
    \ tokens without successfully isolating the root cause.\n  To bridge this gap,\
    \ we propose DAIRA (Dynamic Analysis-enhanced Issue Resolution Agent), a pioneering\
    \ automated repair framework that natively embeds dynamic analysis into the agent's\
    \ reasoning cycle. Driven by a Test Tracing-Driven methodology, DAIRA utilizes\
    \ lightweight monitors to extract critical runtime data -- such as variable mutations\
    \ and call stacks -- and synthesizes them into structured semantic reports. This\
    \ mechanism fundamentally shifts the agent's behavior from blind guesswork to\
    \ evidence-based, deterministic deduction. When powered by Gemini 3 Flash Preview,\
    \ DAIRA establishes a new state-of-the-art (SOTA) performance, achieving a 79.4%\
    \ resolution rate on the SWE-bench Verified dataset. Compared to existing baselines,\
    \ our framework not only conquers highly complex defects but also cuts overall\
    \ inference expenses by roughly 10% and decreases input token consumption by approximately\
    \ 25%."
  tldr: '- **Problem:** Automated code repair using LLMs often fails on complex bugs
    (e.g., implicit type errors, polymorphic flows) because it lacks visibility into
    program runtime behavior, leading to inefficient, speculative guessing.


    - **Core Method:** The DAIRA framework integrates lightweight dynamic analysis
    into the repair agent''s cycle. It uses test tracing to monitor and report runtime
    data (variable mutations, call stacks), turning the agent''s process into evidence-based
    deduction.


    - **Security/Safety Impact:** By enabling precise, deterministic bug diagnosis
    and repair, this method directly improves memory and system safety by reliably
    fixing the root causes of subtle, runtime-dependent vulnerabilities that static
    analysis alone misses.'
