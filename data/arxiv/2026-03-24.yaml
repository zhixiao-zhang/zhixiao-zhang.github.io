- arxiv_id: 2603.22114v1
  title: Lemma Discovery in Agentic Program Verification
  authors:
  - Huan Zhao
  - Haoxin Tu
  - Zhengyao Liu
  - Martin Rinard
  - Abhik Roychoudhury
  summary: "Deductive verification provides strong correctness guarantees for code\
    \ by extracting verification conditions (VCs) and writing formal proofs for them.\
    \ The expertise-intensive task of VC proving is the main bottleneck in this process,\
    \ and has been partly automated owing to recent advances in Large Language Model\
    \ (LLM) agents. However, existing proof agents are not able to discover helper\
    \ lemmas - auxiliary lemmas that aid in proving - and thus fall short as programs\
    \ grow in size and complexity.\n  In this paper, we argue that VC proving for\
    \ program verification is more than a purely mathematical task, and benefits considerably\
    \ from program comprehension. Our key insight is that human-proof engineers often\
    \ discover and apply helper lemmas based on their understanding of the program\
    \ semantics, which are not directly reflected in the VCs produced by VC generators.\
    \ Inspired by this insight, we propose an LLM agent, LemmaNet, that discovers\
    \ helper lemmas in two ways. Specifically, the agent first synthesizes lemmas\
    \ offline by directly analyzing the source code and specifications, and then relating\
    \ this semantic understanding to the mechanical, verbose encoding produced by\
    \ VC generators. As the proof unfolds, LemmaNet then adapts existing helper lemmas\
    \ online to accommodate evolving proof states, enabling the agent to effectively\
    \ discharge complex VCs on-the-fly.\n  We evaluate LemmaNet on SV-COMP and established\
    \ real-world subjects, including modules of the Linux kernel, Contiki OS, standard\
    \ C++ library, and X.509 parser. Our experimental results demonstrate that LemmaNet\
    \ significantly outperforms state-of-the-art approaches, highlighting the importance\
    \ of program comprehension-aided lemma discovery in agentic program verification."
  tldr: '- **Problem:** Deductive verification stalls when proving complex verification
    conditions (VCs) because automated agents cannot discover the necessary helper
    lemmas, which are auxiliary facts derived from understanding the program''s semantics,
    not just its mathematical encoding.


    - **Core method:** LemmaNet is an LLM agent that discovers helper lemmas in two
    stages: offline, by analyzing source code and specifications to synthesize lemmas
    linked to the program''s meaning, and online, by adapting existing lemmas dynamically
    as the proof state changes during verification.


    - **Security impact:** By automating lemma discovery, the method scales deductive
    verification to larger, real-world systems (like OS kernels and parsers), directly
    improving the ability to formally guarantee memory safety and correctness in critical
    low-level software, reducing security risks from undetected bugs.'
  ai_score: 8
  ai_reason: The paper directly addresses program verification and proof automation
    using formal semantics and program analysis, which are core to ensuring memory,
    spatial, and temporal safety in systems like Rust.
