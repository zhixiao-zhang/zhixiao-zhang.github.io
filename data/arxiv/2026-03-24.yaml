- arxiv_id: 2603.22032v1
  title: 'Set-Theoretic Types for Erlang: Theory, Implementation, and Evaluation'
  authors:
  - Albert Schimpf
  - Stefan Wehr
  - Annette Bieniusa
  summary: Erlang's dynamic typing discipline can lead to runtime errors that persist
    even after process restarts. Some of these runtime errors could be prevented through
    static type checking. While Erlang provides a type specification language, the
    compiler does not enforce these types, thereby limiting their role to documentation
    purposes. Type checking Erlang code is challenging due to language features such
    as dynamic type tests, subtyping, equi-recursive types, polymorphism, intersection
    types in signatures, and untagged union types. This work presents a set-theoretic
    type system for Erlang which captures the core features of Erlang's existing type
    language. The formal type system guarantees type soundness, and ensures that type
    checking remains decidable. Additionally, an implementation of a type checker
    is provided, supporting all features of the Erlang type language and most term-level
    language constructs. A case study with modules from Erlang's standard library,
    an external project, and the type checker itself demonstrates its effectiveness
    in verifying real-world Erlang code.
  tldr: '- Addresses Erlang''s lack of enforced static typing, which allows runtime
    type errors to persist across process restarts, reducing reliability in concurrent
    systems.

    - Uses a set-theoretic type system with subtyping, union/intersection types, and
    recursive types to statically check Erlang''s dynamic type tests and specifications
    without requiring code changes.

    - Prevents memory-safety issues like badarg exceptions and process crashes by
    catching type mismatches early, improving system stability in distributed, fault-tolerant
    environments.'
  ai_score: 7
  ai_reason: The paper directly addresses type systems, type theory, and formal semantics
    for a dynamic language, which are core to the researcher's focus on program analysis
    and safety.
