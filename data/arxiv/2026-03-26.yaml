- arxiv_id: 2603.24468v1
  title: Nominal Automata with Name Deallocation
  authors:
  - Simon Prucker
  - Stefan Milius
  - Lutz Schröder
  summary: Data words with binders formalize concurrently allocated memory. Most name-binding
    mechanisms in formal languages, such as the $λ$-calculus, adhere to properly nested
    scoping. In contrast, stateful programming languages with explicit memory allocation
    and deallocation, such as C, commonly interleave the scopes of allocated memory
    regions. This phenomenon is captured in dedicated formalisms such as dynamic sequences
    and bracket algebra, which similarly feature explicit allocation and deallocation
    of letters. One of the classical formalisms for data languages are register automata,
    which have been shown to be equivalent to automata models over nominal sets. In
    the present work, we introduce a nominal automaton model for languages of data
    words with explicit allocation and deallocation that strongly resemble dynamic
    sequences, extending existing nominal automata models by adding deallocating transitions.
    Using a finite NFA-type representation of the model, we establish a Kleene theorem
    that shows equivalence with a natural expression language. Moreover, we show that
    our non-deterministic model allows for determinization, a quite unusual phenomenon
    in the realm of nominal and register automata.
  tldr: "- Addresses the modeling gap for memory allocation/deallocation patterns\
    \ in languages like C, where scopes are interleaved rather than nested, unlike\
    \ formal models such as λ-calculus.  \n- Introduces nominal automata with deallocating\
    \ transitions that explicitly handle allocation and deallocation of names in data\
    \ words, enabling a finite NFA-style representation.  \n- Provides a deterministic\
    \ model for memory-safe reasoning about low-level programs, bridging formal verification\
    \ and real-world systems with explicit memory management."
  ai_score: 7
  ai_reason: The paper introduces a nominal automaton model for data words with explicit
    allocation and deallocation, directly addressing memory safety, spatial safety,
    and formal semantics relevant to stateful programming languages like C, and connects
    to program analysis and abstract interpretation through automata theory.
